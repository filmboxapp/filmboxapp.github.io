<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="google-site-verification" content="MVta7fYIufFXDOm8V4xosjfixFWA8pgXkMYCqivCvJE" />
  <!-- Favicons (Tus originales) -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">
  <link rel="manifest" href="site.webmanifest">
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FILMBOX</title>
  <meta name="description" content="Vive el cine sin límites en FILMBOX. Mira películas y series gratis en línea con los mejores estrenos, acción y suspenso.">
  
  <!-- Fuente moderna -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
  :root {
    --primary: #e50914;
    --accent: #ff3d3d;
    --bg: #0a0a0a;
    --card-radius: 12px;
  }

  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background-color: var(--bg);
    color: #fff;
    -webkit-font-smoothing: antialiased;
  }

  header {
    position: sticky;
    top: 0;
    background-color: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(10px);
    padding: 15px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  header .logo {
    font-size: 26px;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: -1px;
    text-align: center;
  }

  .search-wrapper {
    position: relative;
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
  }

  header input {
    width: 100%;
    padding: 12px 15px;
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.1);
    outline: none;
    background: #1a1a1a;
    color: #ffffff;
    font-size: 14px;
    transition: all 0.3s ease;
    box-sizing: border-box;
  }

  header input:focus {
    background: #252525;
    border-color: var(--primary);
    box-shadow: 0 0 15px rgba(229, 9, 20, 0.2);
  }

  /* Marquee estilizado */
  .marquee {
    width: 100%;
    overflow: hidden;
    background: linear-gradient(90deg, #e50914, #800000);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 0;
    white-space: nowrap;
    margin-top: 0;
  }

  .marquee span {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 15s linear infinite;
  }

  @keyframes scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }

  /* Grid de películas */
  .movies {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 20px 12px;
  }

  @media (min-width: 768px) {
    .movies { grid-template-columns: repeat(6, 1fr); gap: 20px; padding: 25px; }
  }

  .movie-card {
    position: relative;
    background-size: cover;
    background-position: center;
    aspect-ratio: 2/3;
    border-radius: var(--card-radius);
    cursor: pointer;
    display: block;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-decoration: none;
    overflow: hidden;
    background-color: #1a1a1a;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }

  .movie-card:hover {
    transform: scale(1.06);
    box-shadow: 0 10px 25px rgba(229, 9, 20, 0.3);
    z-index: 2;
  }

  /* Superposición oscura para que se vea el póster premium */
  .movie-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 40%);
    pointer-events: none;
  }

  .movie-card .quality-tag {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--primary);
    color: #fff;
    font-size: 10px;
    font-weight: 800;
    padding: 4px 8px;
    border-radius: 6px;
    z-index: 10;
    text-transform: uppercase;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
  }

  /* Loader */
  #loader {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
  }

  .spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255,255,255,0.1);
    border-top: 4px solid var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* Ajustes del reproductor (mantenidos) */
  @media (orientation: landscape) {
    .header-player { height: 100vh; }
  }
</style>
</head>
<body>
  
<div id="loader">
  <div class="spinner"></div>
  <div style="color: #aaa; margin-top: 15px; font-size: 13px; letter-spacing: 2px;">CARGANDO NUESTRO CONTENIDO</div>
</div>

<header>
  <div class="logo">FILMBOX</div>
  <div class="search-wrapper">
    <input type="text" id="search" placeholder="Buscar películas o series...">
  </div>
</header>

<div class="marquee">
  <span>NUEVO CONTENIDO AGREGADO • LOS MEJORES ESTRENOS AQUÍ • DISFRUTA SIN LÍMITES • FILMBOX</span>
</div>

<section class="movies" id="movieList">
  <!-- Las películas se cargarán aquí -->
</section>

<!-- Scripts (Tus funciones originales intactas) -->
<script>
const movieList = document.getElementById('movieList');
const searchInput = document.getElementById('search');
let moviesData = [];

// Cargar JSON
fetch('Peliculas.json')
  .then(response => response.json())
  .then(data => {
    moviesData = data;
    renderMovies(moviesData);
  });

// Función para mostrar películas
function renderMovies(movies) {
  movieList.innerHTML = '';
  movies.forEach(movie => {
    const a = document.createElement('a');
    a.className = 'movie-card';
    a.href = movie.link;
    a.dataset.title = movie.title;
    a.style.backgroundImage = `url('${movie.poster}')`;

    const span = document.createElement('span');
    span.className = 'quality-tag';
    span.textContent = movie.quality || 'HD';

    a.appendChild(span);
    movieList.appendChild(a);
  });
}

// Lógica de búsqueda e historial (Tu código original)
let isSearching = false;

searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase();

  if (q.length > 0 && !isSearching) {
    history.pushState({ search: true }, '');
    isSearching = true;
  }

  if (q.length === 0) {
    isSearching = false;
    searchInput.blur();
  }

  const filtered = moviesData.filter(movie =>
    movie.title.toLowerCase().includes(q)
  );

  renderMovies(filtered);
});

window.addEventListener('popstate', () => {
  if (isSearching || searchInput.value !== '') {
    searchInput.value = '';
    renderMovies(moviesData);
    isSearching = false;
    searchInput.blur();
    history.pushState({ search: false }, '');
  }
});

// Loader logic
window.addEventListener("load", function() {
  const loader = document.getElementById("loader");
  if (sessionStorage.getItem("loaderShown")) {
    loader.style.display = "none";
    return;
  }
  setTimeout(() => {
    loader.style.transition = "opacity 0.8s ease";
    loader.style.opacity = 0;
    setTimeout(() => { loader.style.display = "none"; }, 800);
  }, 3000);
  sessionStorage.setItem("loaderShown", "true");
});

// Scroll persistence
window.addEventListener("beforeunload", () => {
  sessionStorage.setItem("scrollPos", window.scrollY);
});

window.addEventListener("load", () => {
  const scrollPos = sessionStorage.getItem("scrollPos");
  if (scrollPos) {
    setTimeout(() => { window.scrollTo(0, parseInt(scrollPos)); }, 100);
  }
});
</script>

</body>
</html>
